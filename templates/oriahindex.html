
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelligent Security Log Summarization</title>
  <style>
    :root {
      --bg: #f3f6fa;
      --panel: #ffffff;
      --ink: #162033;
      --muted: #5d697b;
      --line: #dbe3ee;
      --brand: #13233a;
      --accent: #0f8b8d;
      --medium: #d99700;
      --high: #d85c27;
      --critical: #c92a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    header {
      background: var(--brand);
      color: #ffffff;
      padding: 28px 44px;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 30px;
      letter-spacing: 0;
    }

    header p {
      max-width: 860px;
      margin: 0;
      color: #d8e2f0;
      font-size: 14px;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 20px auto 42px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 18px;
      padding: 20px;
      box-shadow: 0 1px 3px rgba(16, 24, 40, 0.07);
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px;
      gap: 18px;
      align-items: stretch;
    }

    .risk-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
    }
