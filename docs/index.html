<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Week 6 HTML Report Generator</title>
  <style>
    :root {
      --bg: #eef2f6;
      --surface: #ffffff;
      --ink: #182235;
      --muted: #5d697c;
      --line: #d9e1ea;
      --brand: #14324a;
      --accent: #0f8b8d;
      --low: #4f7f53;
      --medium: #b7791f;
      --high: #c05621;
      --critical: #c53030;
    }

    * {
    header {
      background: var(--brand);
      color: #ffffff;
      padding: 28px 40px;
    }

    header h1 {
      font-size: 30px;
      letter-spacing: 0;
      margin: 0 0 6px;
    }

    header p {
      color: #d9e6f2;
      font-size: 14px;
      margin: 0;
      max-width: 900px;
    }

    main {
      margin: 20px auto 44px;
      width: min(1120px, calc(100% - 28px));
    }

    .report-shell {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .report-header,
    .report-section {
      padding: 22px 24px;
    }

    .report-section {
      border-top: 1px solid var(--line);
    }

    .report-header {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1fr) 220px;
    }

    h2 {
      font-size: 21px;
      margin: 0 0 12px;
    }

    h3 {
      font-size: 16px;
      margin: 0 0 8px;
    }

    p {
      margin: 0;
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    .meta-grid,
    .two-column,
    .three-column {
      display: grid;
      gap: 14px;
    }

    .meta-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 18px;
    }
